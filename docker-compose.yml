services:
  postgres :
    image: postgres:15-alpine
    ports:
      - ${DB_PORT}:${DB_PORT}
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - "db:/var/lib/postgresql/data"
    networks:
      - drf_network

volumes:
  db:

networks:
  drf_network:
    driver: bridge
